worker_processes auto;

events {
  # default is 768, way too low for 1000+ concurrent connections -
  # each proxied request uses 2 sockets (client + upstream), so we
  # actually need headroom well above 1000
  worker_connections 4096;
}

http {
  # passive health check: if a backend fails 3 requests in a row,
  # nginx stops sending it traffic for 10s and only uses the other one.
  # (active health checks that ping /health on a timer need nginx plus
  # or something like openresty - this is what's available in stock nginx)
  upstream node_backend {
    server 127.0.0.1:3001 max_fails=3 fail_timeout=10s;
    server 127.0.0.1:3002 max_fails=3 fail_timeout=10s;
  }

  server {
    listen 8080;

    location / {
      proxy_pass http://node_backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;

      # if the backend nginx picked is down, retry on the other one
      # instead of just failing the request
      proxy_next_upstream error timeout http_502 http_503;
    }
  }
}
