server {
  listen 80;

  location / {
    root /usr/share/nginx/html;
    index index.html;
    # SPA routing - if the file doesn't exist, fall back to index.html
    # and let react handle the route client-side
    try_files $uri /index.html;
  }

  location /api/ {
    proxy_pass http://backend:5000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }
}
