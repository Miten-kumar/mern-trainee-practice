services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev

    ports:
      - "5000:5000"

    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

    environment:
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: myapp
      DB_USER: admin
      DB_PASSWORD: your_password
      REDIS_URL: redis://redis:6379

    depends_on:
      - postgres
      - redis


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev

    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

    environment:
      VITE_API_URL: http://localhost:5000

    depends_on:
      - backend


  postgres:
    image: postgres:16

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: your_password
      POSTGRES_DB: myapp

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  redis:
    image: redis:7-alpine

    ports:
      - "6379:6379"


volumes:

  postgres_data:

  backend_node_modules:

  frontend_node_modules:
